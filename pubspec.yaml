name: tcgsimulator
description: BoardKit — 汎用カードゲーム盤面ツール
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # 状態管理
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # ルーティング
  go_router: ^13.2.0

  # ローカルDB (web/mobile/desktop対応)
  hive_ce: ^2.9.0
  hive_ce_flutter: ^2.2.0

  # 画像処理
  image_picker: ^1.1.2
  image: ^4.1.7
  path_provider: ^2.1.3
  path: ^1.9.0

  # UUID
  uuid: ^4.4.0

  # Firebase
  firebase_core: ^2.31.0
  firebase_auth: ^4.19.0
  cloud_firestore: ^4.17.0
  firebase_storage: ^11.7.0
  firebase_crashlytics: ^3.5.0
  firebase_analytics: ^10.10.0

  # 課金
  in_app_purchase: ^3.2.0

  # UI
  cached_network_image: ^3.3.1
  flutter_localizations:
    sdk: flutter
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_icon.png"

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/presets/
